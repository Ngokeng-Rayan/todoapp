{% extends 'todo/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Ajouter une tâche</h5>
                <form action="{% url 'add_task' %}" method="POST" class="d-flex">
                    {% csrf_token %}
                    <input type="text" name="title" class="form-control me-2" placeholder="Ex: Mettre en place le pipeline CI/CD..." required>
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <ul class="list-group list-group-flush">
                {% for task in tasks %}
                <li class="list-group-item d-flex justify-content-between align-items-center py-3 {% if task.completed %}bg-light{% endif %}">
                    <div class="d-flex align-items-center">
                        <a href="{% url 'toggle_task' task.id %}" class="text-decoration-none me-3">
                            {% if task.completed %}
                                <i class="bi bi-check-circle-fill text-success fs-5"></i>
                            {% else %}
                                <i class="bi bi-circle text-secondary fs-5"></i>
                            {% endif %}
                        </a>
                        <span class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                            {{ task.title }}
                        </span>
                    </div>
                    <a href="{% url 'delete_task' task.id %}" class="btn btn-sm btn-outline-danger" title="Supprimer" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette tâche ?');">
                        <i class="bi bi-trash"></i>
                    </a>
                </li>
                {% empty %}
                <li class="list-group-item text-center text-muted py-4">
                    Aucune tâche pour le moment. À vous de jouer !
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
