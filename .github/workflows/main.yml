name: Kaba-Delivery CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ---------------------------------------------------------
  # STAGE 1: LINT & TEST 
  # ---------------------------------------------------------
  lint_and_test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with Flake8
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissements
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests
        run: |
          python manage.py test

  # ---------------------------------------------------------
  # STAGE 2: CODE QUALITY (SONARQUBE) 
  # ---------------------------------------------------------
  sonar_analysis:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: lint_and_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Décommenter uniquement si SonarQube n'est pas sur SonarCloud
        # Ligne désactivée temporairement pour éviter un échec si tu n'as pas de compte SonarCloud
        # run: echo "Simulation SonarQube - En attente de configuration"
        
  # ---------------------------------------------------------
  # STAGE 3 & 4: BUILD, SECURITY SCAN (TRIVY) & DOCKER HUB PUSH
  # ---------------------------------------------------------
  build_scan_and_push:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonar_analysis
    # Ne se lance que sur la branche main
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t kaba-delivery:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kaba-delivery:latest'
          format: 'table'
          exit-code: '0' # Mettre à '1' en production pour bloquer le pipeline en cas de faille 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push to Docker Hub
        run: |
          docker tag kaba-delivery:latest ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:${{ github.sha }}
          docker tag kaba-delivery:latest ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:latest

  # ---------------------------------------------------------
  # STAGE 5: DEPLOY TO O2SWITCH VIA FTP
  # ---------------------------------------------------------
  deploy_o2switch_ftp:
    name: Deploy to o2switch (FTP)
    runs-on: ubuntu-latest
    needs: build_scan_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create restart.txt to restart Phusion Passenger (cPanel)
        run: |
          mkdir -p tmp
          touch tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          exclude: |
            **/.git*
            **/.git*/**
            **/venv/**
            **/__pycache__/**
            **/*.sqlite3
            **/node_modules/**
